; FireLabs Weather Display
; LilyGo T-Energy-S3 (ESP32-S3) + GoodDisplay GDEY042T81 4.2" e-paper

[platformio]
name = firelabs-weather-display
default_envs = wx

[env:wx]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200

build_flags =
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DARDUINO_USB_MODE=1   ; Serial on the hardware USB-Serial-JTAG (same port esptool uses)
    ; brand strings live in src/Branding.h (the AP prefix has a space)

lib_deps =
    zinggjm/GxEPD2 @ ^1.5.6
    bblanchon/ArduinoJson @ ^7.2.0
    https://github.com/FireLabsCA/firelabs-core.git
    ; a lib/firelabs-core symlink (gitignored) takes precedence for local dev
